<!doctype html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <meta name="format-detection" content="telephone=no">

  <title>🎉 Convite ao Anastasia Party</title>

  <!-- Favicon -->
  <link rel="icon"
    href="image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>"
    type="image/svg+xml" />

  <link rel="alternate icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f389.png"
    type="image/png" sizes="32x32" />

  <!-- Open Graph -->
  <meta property="og:title" content="🎉 És nosso convidado especial!" />
  <meta property="og:description" content="Anastasia faz 15!" />
  <meta property="og:image" content="https://castrillocode.github.io/anas/assets/emoji_festa.png" />
  <meta property="og:url" content="https://castrillocode.github.io/anas/" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="🎉 És nosso convidado especial!" />
  <meta name="twitter:description" content="Anastasia faz 15!" />
  <meta name="twitter:image" content="https://castrillocode.github.io/anas/assets/emoji_festa.png" />

  <!-- Preload -->
  <link rel="preload" href="assets/envelope.png" as="image" />
  <link rel="preload" href="assets/anas.gif" as="image" />
  <link rel="preload" href="assets/music.mp3" as="audio" type="audio/mpeg" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles/styles.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&display=swap" rel="stylesheet">

</head>

<body>

  <!-- Intro screen -->
  <div id="intro-screen">

    <h2>
      Um convite especial <br>
      está a chegar 🎉
    </h2>

    <img src="assets/envelope.png" alt="Abrir convite" id="envelope" class="envelope-img" loading="eager">

    <div class="click-text">
      👆<br>Click
    </div>

    <div id="flash"></div>

  </div>

  <!-- Main content -->

  <div id="main-content" style="display:none">

    <h1>Estás convidado para <br> o meu 15° aniversário</h1>

    <img src="assets/anas.gif" alt="Anastasia celebrando seus 15 anos" class="event-img" loading="eager">

    <h3>Anastasia</h3>

    <div class="dateCountdown">
      18 de julho 2026 desde 18h até as 23h
    </div>

    <div class="countdown" id="countdown"></div>

    <!-- Confirm button -->

    <a class="button neon glow-border"
      href="https://wa.me/351962400298?text=Confirmo%20minha%20presen%C3%A7a.%0A%0ADress%20code:%20branco%20obrigat%C3%B3rio.%0A%0AHaver%C3%A1%20cerveja,%20sidra,%20refrigerantes%20e%20%C3%A1gua%20dispon%C3%ADveis.%0ASe%20quiser%20beber%20algo%20diferente,%20fica%20por%20tua%20conta.%0A%0AData:%2018%20de%20julho%20de%202026%0AHor%C3%A1rio:%2018h00%20-%2023h00.%0A%0ALocal:%20Escola%20de%20Dan%C3%A7a%20ARTE%20EM%20MOVIMENTO.%0Ahttps://maps.app.goo.gl/GAPafW21fNis3mdLA"
      target="_blank">

      Confirmar Assistência <br>
      (Até 18 de junho)

    </a>

    <div class="button-container">

      <a class="button" href="https://maps.app.goo.gl/GAPafW21fNis3mdLA" target="_blank">

        📍 Endereço

      </a>

      <a class="button" href="javascript:void(0)" onclick="addToGoogleCalendar()">

        Adicionar ao meu calendário

      </a>

    </div>

    <footer>

      Designed by

      <a href="https://www.instagram.com/rocacreatives/?hl=pt" target="_blank">

        Roca Creatives

      </a>

    </footer>

    <div class="disco-lights" id="disco-lights"></div>

  </div>

  <!-- Background music -->

  <audio id="bg-music" src="assets/music.mp3" preload="auto" loop>
  </audio>

  <script>

    const envelope = document.getElementById("envelope");
    const intro = document.getElementById("intro-screen");
    const main = document.getElementById("main-content");
    const music = document.getElementById("bg-music");
    const flash = document.getElementById("flash");

    envelope.addEventListener("click", () => {

      envelope.style.pointerEvents = "none";

      music.play().catch(() => { });

      envelope.classList.add("open");

      flash.style.display = "block";
      flash.classList.add("flash-animate");

      setTimeout(() => {

        intro.style.display = "none";
        main.style.display = "block";
        document.body.style.overflowY = "auto";

        launchConfetti();

      }, 900)

    });

    const countdownElement = document.getElementById("countdown");
    const eventDate = new Date("2026-07-18T18:00:00");

    function updateCountdown() {

      const now = new Date();
      const diff = eventDate - now;

      if (diff <= 0) {
        countdownElement.innerHTML = "A festa começou!";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      countdownElement.innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;

    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    const discoContainer = document.getElementById("disco-lights");

    const colors = [
      "#ffb3ff",
      "#b3ffff",
      "#ffe6b3",
      "#d9b3ff",
      "#b3ffb3"
    ];

    function createLight() {

      const light = document.createElement("div");

      light.classList.add("light");

      light.style.left = Math.random() * 100 + "%";
      light.style.top = Math.random() * 100 + "%";

      light.style.backgroundColor =
        colors[Math.floor(Math.random() * colors.length)];

      light.style.animationDuration =
        1 + Math.random() * 2 + "s";

      light.style.width =
        light.style.height =
        8 + Math.random() * 12 + "px";

      discoContainer.appendChild(light);

      setTimeout(() => {

        if (light.parentNode)
          discoContainer.removeChild(light)

      }, 3000)

    }

    setInterval(createLight, 500);

    function launchConfetti() {

      const confettiColors = [
        "#4caf50",
        "#ffeb3b",
        "#ff5722",
        "#03a9f4",
        "#e91e63"
      ];

      const container = document.createElement("div");

      container.className = "confetti-container";

      Object.assign(container.style, {
        position: "fixed",
        top: 0,
        left: 0,
        width: "100%",
        height: "100%",
        pointerEvents: "none",
        zIndex: "1000"
      });

      document.body.appendChild(container);

      for (let i = 0; i < 80; i++) {

        const piece = document.createElement("div");

        Object.assign(piece.style, {
          position: "absolute",
          width: `${Math.random() * 8 + 4}px`,
          height: `${Math.random() * 8 + 4}px`,
          backgroundColor:
            confettiColors[Math.floor(Math.random() * confettiColors.length)],
          top: `${Math.random() * 100}%`,
          left: `${Math.random() * 100}%`,
          opacity: Math.random(),
          transform: `rotate(${Math.random() * 360}deg)`,
          animation: `fall ${Math.random() * 3 + 2}s ease-out forwards`
        });

        container.appendChild(piece);

      }

      setTimeout(() => {

        if (container.parentNode)
          container.remove()

      }, 4000)

    }

    const style = document.createElement("style");

    style.textContent = `
      @keyframes fall {
        0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }
    `;

    document.head.appendChild(style);

    function addToGoogleCalendar() {

      const title = "Anastasia — Festa de 15 Anos";

      const startDate = "20260718T180000";
      const endDate = "20260718T230000";

      const location = "Escola de Dança ARTE EM MOVIMENTO";

      const details = `
Estás convidado para celebrar comigo este momento especial.

Dress code: branco obrigatório.

Haverá cerveja, sidra, refrigerantes e água disponíveis.
Se quiser beber algo diferente, fica por tua conta.

Localização:
https://maps.app.goo.gl/GAPafW21fNis3mdLA
`;

      const calendarUrl =
        "https://www.google.com/calendar/render?action=TEMPLATE" +
        "&text=" + encodeURIComponent(title) +
        "&dates=" + startDate + "/" + endDate +
        "&location=" + encodeURIComponent(location) +
        "&details=" + encodeURIComponent(details);

      window.location.href = calendarUrl;

    }

  </script>

</body>

</html>
